services:

  inventory-db:
    image: debezium/postgres:17-alpine
    container_name: inventory-db
    hostname: inventory-db
    ports:
      - "5001:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory-db
    networks:
      - outbox-micro-service
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/5432" ]
      interval: 10s
      retries: 5


  product-db:
    image: debezium/postgres:17-alpine
    container_name: product-db
    hostname: product-db
    ports:
      - "5002:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product-db
    networks:
      - outbox-micro-service
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/5432" ]
      interval: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.14
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      product-db:
        condition: service_healthy
      inventory-db:
        condition: service_healthy
    networks:
      - outbox-micro-service-micro

  kafka:
   image: apache/kafka:latest
   container_name: kafka
   hostname: kafka
   ports:
    - "9092:9092"
    - "29092:29092"
   environment:
    KAFKA_NODE_ID: 1
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
    KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    KAFKA_NUM_PARTITIONS: 1
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
   restart: unless-stopped
   networks:
    - outbox-micro-service
   healthcheck:
    test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092" ]
    interval: 10s
    retries: 5

  debezium-connect:
    image: debezium/connect:2.7.3.Final
    container_name: debezium
    hostname: debezium
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      product-db:
        condition: service_healthy
      inventory-db:
        condition: service_healthy
    environment:
      CONNECT_ADVERTISED_HOST_NAME: debezium
      CONNECT_ADVERTISED_PORT: 8083
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter


  kafka-UI:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-UI
    hostname: kafka-UI
    depends_on:
      - kafka
    restart: unless-stopped
    ports:
      - "8082:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - outbox-micro-service


networks:
  outbox-micro-service:
    name: outbox-micro-service
    driver: bridge

